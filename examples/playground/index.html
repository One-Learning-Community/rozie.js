<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Rozie Playground</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script>
      // Runtime process polyfill — installed synchronously before any ES
      // module loads so that dep code reading `process.env.X` at module-eval
      // time (postcss, @babel/types) sees a defined global. The vite `define`
      // block handles known literal keys at transform time; this catches the
      // dynamic and unknown-key cases.
      window.process = window.process || {
        env: { NODE_ENV: 'production' },
        platform: 'browser',
        cwd: function () { return '/'; },
        versions: {},
        argv: [],
      };
    </script>
  </head>
  <body>
    <header>
      <label for="target">Target:</label>
      <select id="target">
        <option value="react" selected>react</option>
        <option value="vue">vue</option>
        <option value="svelte">svelte</option>
        <option value="angular">angular</option>
      </select>
    </header>
    <main>
      <div id="editor"></div>
      <div id="output"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
