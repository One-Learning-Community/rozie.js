<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Rozie preview — Solid</title>
    <script type="importmap">
      {
        "imports": {
          "solid-js": "https://esm.sh/solid-js@1.9.13",
          "solid-js/web": "https://esm.sh/solid-js@1.9.13/web",
          "solid-js/store": "https://esm.sh/solid-js@1.9.13/store",
          "solid-js/h/jsx-runtime": "https://esm.sh/solid-js@1.9.13/h/jsx-runtime",
          "@rozie/runtime-solid": "/preview/runtimes/solid.mjs",
          "postcss": "https://esm.sh/postcss@8.5.16",
          "sortablejs": "https://esm.sh/sortablejs@1.15.7",
          "flatpickr": "https://esm.sh/flatpickr@4.6.13",
          "leaflet": "https://esm.sh/leaflet@1.9.4",
          "chart.js": "https://esm.sh/chart.js@4.5.1",
          "@fullcalendar/core": "https://esm.sh/@fullcalendar/core@6.1.21",
          "@fullcalendar/daygrid": "https://esm.sh/@fullcalendar/daygrid@6.1.21",
          "@fullcalendar/timegrid": "https://esm.sh/@fullcalendar/timegrid@6.1.21",
          "@fullcalendar/interaction": "https://esm.sh/@fullcalendar/interaction@6.1.21",
          "@tiptap/core": "https://esm.sh/@tiptap/core@3.27.1",
          "@tiptap/starter-kit": "https://esm.sh/@tiptap/starter-kit@3.27.1",
          "@uppy/core": "https://esm.sh/@uppy/core@5.2.0",
          "@uppy/xhr-upload": "https://esm.sh/@uppy/xhr-upload@5.2.0",
          "embla-carousel": "https://esm.sh/embla-carousel@8.6.0",
          "embla-carousel-autoplay": "https://esm.sh/embla-carousel-autoplay@8.6.0",
          "cropperjs": "https://esm.sh/cropperjs@1.6.2",
          "@codemirror/state": "https://esm.sh/@codemirror/state@6.7.0",
          "@codemirror/view": "https://esm.sh/@codemirror/view@6.43.4",
          "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.10.4",
          "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@6.2.5",
          "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.3",
          "codemirror": "https://esm.sh/codemirror@6.0.2",
          "pdfjs-dist": "https://esm.sh/pdfjs-dist@6.1.200",
          "@tanstack/table-core": "https://esm.sh/@tanstack/table-core@8.21.3",
          "@tanstack/virtual-core": "https://esm.sh/@tanstack/virtual-core@3.17.3",
          "@floating-ui/dom": "https://esm.sh/@floating-ui/dom@1.7.6"
        }
      }
    </script>
    <!-- Cropper.js overlay CSS is EXTERNAL (not shippable via the scoped .rozie <style>);
         the playground drops CSS side-effect imports, so link it here (68-04). -->
    <link rel="stylesheet" href="https://esm.sh/cropperjs@1.6.2/dist/cropper.css" />
    <style>
      html, body { margin: 0; height: 100%; font-family: system-ui; }
      #app { min-height: 100%; padding: 12px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { render } from 'solid-js/web';
      import { createComponent } from 'solid-js';
      import { getEsbuildTransform, importBundleWith, bootHarness, stubUnresolvableImports } from './_shared.js';

      const host = document.getElementById('app');
      let dispose = null;

      bootHarness(async ({ code, siblings }) => {
        const transform = await getEsbuildTransform();

        // Per-source transform — same shape as React (stub CSS imports, esbuild
        // tsx → esm) but with the Solid jsx runtime so JSX becomes
        // createComponent / signals instead of React.createElement.
        const transformOne = async (src) => {
          const result = await transform(stubUnresolvableImports(src), {
            loader: 'tsx',
            format: 'esm',
            target: 'es2020',
            jsx: 'automatic',
            jsxImportSource: 'solid-js/h',
          });
          return result.code;
        };

        const mod = await importBundleWith(transformOne, code, siblings ?? {});
        const Component = mod.default || mod.Component;
        if (typeof Component !== 'function') {
          throw new Error('compiled output has no default Solid component export');
        }

        if (dispose) dispose();
        dispose = render(() => createComponent(Component, {}), host);
      });
    </script>
  </body>
</html>
