<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Rozie preview — Solid</title>
    <script type="importmap">
      {
        "imports": {
          "solid-js": "https://esm.sh/solid-js@1.9.4",
          "solid-js/web": "https://esm.sh/solid-js@1.9.4/web",
          "solid-js/store": "https://esm.sh/solid-js@1.9.4/store",
          "solid-js/h/jsx-runtime": "https://esm.sh/solid-js@1.9.4/h/jsx-runtime",
          "@rozie/runtime-solid": "/preview/runtimes/solid.mjs",
          "sortablejs": "https://esm.sh/sortablejs@1.15.6"
        }
      }
    </script>
    <style>
      html, body { margin: 0; height: 100%; font-family: system-ui; }
      #app { min-height: 100%; padding: 12px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { render } from 'solid-js/web';
      import { createComponent } from 'solid-js';
      import { getEsbuildTransform, importFromString, bootHarness, stubUnresolvableImports } from './_shared.js';

      const host = document.getElementById('app');
      let dispose = null;

      bootHarness(async ({ code }) => {
        const transform = await getEsbuildTransform();
        const result = await transform(stubUnresolvableImports(code), {
          loader: 'tsx',
          format: 'esm',
          target: 'es2020',
          // Use solid's jsx runtime so JSX expressions become createComponent /
          // signals rather than React.createElement.
          jsx: 'automatic',
          jsxImportSource: 'solid-js/h',
        });

        const mod = await importFromString(result.code);
        const Component = mod.default || mod.Component;
        if (typeof Component !== 'function') {
          throw new Error('compiled output has no default Solid component export');
        }

        if (dispose) dispose();
        dispose = render(() => createComponent(Component, {}), host);
      });
    </script>
  </body>
</html>
