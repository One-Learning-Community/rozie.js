          "svelte/compiler": "https://esm.sh/svelte@5.56.4/compiler",

          "@fullcalendar/core": "https://esm.sh/@fullcalendar/core@6.1.21",
          "@fullcalendar/daygrid": "https://esm.sh/@fullcalendar/daygrid@6.1.21",
          "@fullcalendar/timegrid": "https://esm.sh/@fullcalendar/timegrid@6.1.21",
          "@fullcalendar/interaction": "https://esm.sh/@fullcalendar/interaction@6.1.21",
          "@tiptap/core": "https://esm.sh/@tiptap/core@3.27.1",
          "@tiptap/starter-kit": "https://esm.sh/@tiptap/starter-kit@3.27.1",
          "@uppy/core": "https://esm.sh/@uppy/core@5.2.0",
          "@uppy/xhr-upload": "https://esm.sh/@uppy/xhr-upload@5.2.0",
          "embla-carousel": "https://esm.sh/embla-carousel@8.6.0",
          "embla-carousel-autoplay": "https://esm.sh/embla-carousel-autoplay@8.6.0",
          "cropperjs": "https://esm.sh/cropperjs@1.6.2",
          "@codemirror/state": "https://esm.sh/@codemirror/state@6.7.0",
          "@codemirror/view": "https://esm.sh/@codemirror/view@6.43.4",
          "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.10.4",
          "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@6.2.5",
          "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.3",
          "codemirror": "https://esm.sh/codemirror@6.0.2",
          "pdfjs-dist": "https://esm.sh/pdfjs-dist@6.1.200",
          "@tanstack/table-core": "https://esm.sh/@tanstack/table-core@8.21.3",
          "@tanstack/virtual-core": "https://esm.sh/@tanstack/virtual-core@3.17.3",
          "@floating-ui/dom": "https://esm.sh/@floating-ui/dom@1.7.6"
        }
      }
    </script>
    <style>
      html, body { margin: 0; height: 100%; font-family: system-ui; }
      #app { min-height: 100%; padding: 12px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { compile } from 'svelte/compiler';
      import { mount, unmount } from 'svelte';
      import { getEsbuildTransform, importBundleWith, bootHarness, clearHost, isPassthroughTs, stubUnresolvableImports, injectEngineCss } from './_shared.js';

      const host = document.getElementById('app');
      let instance = null;

      bootHarness(async ({ code: sfcSource, siblings }) => {
        const transform = await getEsbuildTransform();

        // Per-source: Svelte 5 runes-mode compile to client output, then ts
        // lower in case the <script lang="ts"> block survived as TS. Each
        // sibling SFC becomes its own module whose default export is the
        // child component the entry imports.
        const transformOne = async (src) => {
          // Phase 68-03 — a plain relative `.ts` helper sibling (e.g.
          // `./internal/resizeMath`). esbuild-lower it directly; `compile()`
          // below expects Svelte component markup and would throw on raw TS.
          if (isPassthroughTs(src)) {
            const lowered = await transform(src, { loader: 'ts', format: 'esm', target: 'es2022' });
            return lowered.code;
          }
          // `svelte.compile` does not tolerate an unresolvable bare `.css`
          // import inside `<script>` either — strip/capture it first
          // (Phase 69-01), same as every other harness.
          const { code: stubbedSrc, cssSpecifiers } = stubUnresolvableImports(src);
          injectEngineCss(cssSpecifiers);
          const compiled = compile(stubbedSrc, {
            filename: 'Playground.svelte',
            generate: 'client',
            dev: false,
            css: 'injected',
          });
          const tsLowered = await transform(compiled.js.code, {
            loader: 'ts',
            format: 'esm',
            target: 'es2022',
          });
          return tsLowered.code;
        };

        const mod = await importBundleWith(transformOne, sfcSource, siblings ?? {});
        const Component = mod.default;
        if (!Component) throw new Error('Svelte compile produced no default export');

        if (instance) {
          try { unmount(instance); } catch (_) { /* svelte 5 mount return */ }
        }
        clearHost(host);
        instance = mount(Component, { target: host });
      });
    </script>
  </body>
</html>
