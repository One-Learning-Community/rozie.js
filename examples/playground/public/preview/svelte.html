<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Rozie preview — Svelte</title>
    <script type="importmap">
      {
        "imports": {
          "svelte": "https://esm.sh/svelte@5.19.7",
          "svelte/compiler": "https://esm.sh/svelte@5.19.7/compiler",
          "svelte/internal": "https://esm.sh/svelte@5.19.7/internal",
          "svelte/internal/client": "https://esm.sh/svelte@5.19.7/internal/client",
          "svelte/internal/disclose-version": "https://esm.sh/svelte@5.19.7/internal/disclose-version",
          "esm-env": "https://esm.sh/esm-env@1.2.2",
          "@rozie/runtime-svelte": "/preview/runtimes/svelte.mjs",
          "sortablejs": "https://esm.sh/sortablejs@1.15.6",
          "flatpickr": "https://esm.sh/flatpickr@4.6.13",
          "leaflet": "https://esm.sh/leaflet@1.9.4",
          "chart.js": "https://esm.sh/chart.js@4.5.1",
          "@fullcalendar/core": "https://esm.sh/@fullcalendar/core@6.1.20",
          "@fullcalendar/daygrid": "https://esm.sh/@fullcalendar/daygrid@6.1.20",
          "@fullcalendar/timegrid": "https://esm.sh/@fullcalendar/timegrid@6.1.20",
          "@fullcalendar/interaction": "https://esm.sh/@fullcalendar/interaction@6.1.20",
          "@tiptap/core": "https://esm.sh/@tiptap/core@3.23.5",
          "@tiptap/starter-kit": "https://esm.sh/@tiptap/starter-kit@3.23.5",
          "@uppy/core": "https://esm.sh/@uppy/core@5.2.0",
          "@uppy/xhr-upload": "https://esm.sh/@uppy/xhr-upload@5.2.0"
        }
      }
    </script>
    <style>
      html, body { margin: 0; height: 100%; font-family: system-ui; }
      #app { min-height: 100%; padding: 12px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { compile } from 'svelte/compiler';
      import { mount, unmount } from 'svelte';
      import { getEsbuildTransform, importBundleWith, bootHarness, clearHost, isPassthroughTs } from './_shared.js';

      const host = document.getElementById('app');
      let instance = null;

      bootHarness(async ({ code: sfcSource, siblings }) => {
        const transform = await getEsbuildTransform();

        // Per-source: Svelte 5 runes-mode compile to client output, then ts
        // lower in case the <script lang="ts"> block survived as TS. Each
        // sibling SFC becomes its own module whose default export is the
        // child component the entry imports.
        const transformOne = async (src) => {
          // Phase 68-03 — a plain relative `.ts` helper sibling (e.g.
          // `./internal/resizeMath`). esbuild-lower it directly; `compile()`
          // below expects Svelte component markup and would throw on raw TS.
          if (isPassthroughTs(src)) {
            const lowered = await transform(src, { loader: 'ts', format: 'esm', target: 'es2022' });
            return lowered.code;
          }
          const compiled = compile(src, {
            filename: 'Playground.svelte',
            generate: 'client',
            dev: false,
            css: 'injected',
          });
          const tsLowered = await transform(compiled.js.code, {
            loader: 'ts',
            format: 'esm',
            target: 'es2022',
          });
          return tsLowered.code;
        };

        const mod = await importBundleWith(transformOne, sfcSource, siblings ?? {});
        const Component = mod.default;
        if (!Component) throw new Error('Svelte compile produced no default export');

        if (instance) {
          try { unmount(instance); } catch (_) { /* svelte 5 mount return */ }
        }
        clearHost(host);
        instance = mount(Component, { target: host });
      });
    </script>
  </body>
</html>
