<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Rozie preview — Angular</title>
    <script type="importmap">
      {
        "imports": {
          "@rozie/runtime-keynav-core": "/preview/runtimes/keynav-core.mjs",
          "@angular/core": "https://esm.sh/@angular/core@19.2.25",
          "@angular/core/rxjs-interop": "https://esm.sh/@angular/core@19.2.25/rxjs-interop",
          "@angular/common": "https://esm.sh/@angular/common@19.2.25",
          "@angular/compiler": "https://esm.sh/@angular/compiler@19.2.25",
          "@angular/forms": "https://esm.sh/@angular/forms@19.2.25",
          "@angular/platform-browser": "https://esm.sh/@angular/platform-browser@19.2.25",
          "@angular/platform-browser-dynamic": "https://esm.sh/@angular/platform-browser-dynamic@19.2.25",
          "rxjs": "https://esm.sh/rxjs@7.8.2",
          "rxjs/operators": "https://esm.sh/rxjs@7.8.2/operators",
          "tslib": "https://esm.sh/tslib@2.8.1",
          "sortablejs": "https://esm.sh/sortablejs@1.15.7",
          "flatpickr": "https://esm.sh/flatpickr@4.6.13",
          "leaflet": "https://esm.sh/leaflet@1.9.4",
          "chart.js": "https://esm.sh/chart.js@4.5.1",
          "@fullcalendar/core": "https://esm.sh/@fullcalendar/core@6.1.21",
          "@fullcalendar/daygrid": "https://esm.sh/@fullcalendar/daygrid@6.1.21",
          "@fullcalendar/timegrid": "https://esm.sh/@fullcalendar/timegrid@6.1.21",
          "@fullcalendar/interaction": "https://esm.sh/@fullcalendar/interaction@6.1.21",
          "@tiptap/core": "https://esm.sh/@tiptap/core@3.27.1",
          "@tiptap/starter-kit": "https://esm.sh/@tiptap/starter-kit@3.27.1",
          "@uppy/core": "https://esm.sh/@uppy/core@5.2.0",
          "@uppy/xhr-upload": "https://esm.sh/@uppy/xhr-upload@5.2.0",
          "embla-carousel": "https://esm.sh/embla-carousel@8.6.0",
          "embla-carousel-autoplay": "https://esm.sh/embla-carousel-autoplay@8.6.0",
          "cropperjs": "https://esm.sh/cropperjs@1.6.2",
          "@codemirror/state": "https://esm.sh/@codemirror/state@6.7.0",
          "@codemirror/view": "https://esm.sh/@codemirror/view@6.43.4",
          "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.10.4",
          "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@6.2.5",
          "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.3",
          "codemirror": "https://esm.sh/codemirror@6.0.2",
          "pdfjs-dist": "https://esm.sh/pdfjs-dist@6.1.200",
          "@tanstack/table-core": "https://esm.sh/@tanstack/table-core@8.21.3",
          "@tanstack/virtual-core": "https://esm.sh/@tanstack/virtual-core@3.17.3",
          "@floating-ui/dom": "https://esm.sh/@floating-ui/dom@1.7.6"
        }
      }
    </script>
    <style>
      html, body { margin: 0; height: 100%; font-family: system-ui; }
      #app { min-height: 100%; padding: 12px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      // Order matters:
      //   1. zone.js — patches globals; must complete before any Angular code runs.
      //   2. @angular/compiler — registers the JIT compiler; required because
      //      Rozie emits standalone components that aren't AOT-precompiled,
      //      so the platform needs to JIT-compile the template at runtime.
      //      Without this, you get "needs JIT compiler" errors on every
      //      injectable.
      //   3. Everything else.
      await import('https://esm.sh/zone.js@0.15.0');
      await import('@angular/compiler');

      const [
        coreNs,
        { bootstrapApplication },
        { getEsbuildTransform, importBundleWith, bootHarness, clearHost, stubUnresolvableImports, injectEngineCss },
      ] = await Promise.all([
          import('@angular/core'),
          import('@angular/platform-browser'),
          import('./_shared.js'),
        ]);
      const { provideZoneChangeDetection, ɵprovideZonelessChangeDetection: provideZonelessChangeDetection } = coreNs;

      // Angular requires a unique element selector + a unique mount-point on
      // each render; emit a fresh root tag per render and rewrite the
      // compiled component's selector to match.
      const host = document.getElementById('app');
      let appRef = null;
      let renderCount = 0;

      bootHarness(async ({ code, siblings }) => {
        ++renderCount;
        const transform = await getEsbuildTransform();
        const siblingsMap = siblings ?? {};
        const totalCalls = Object.keys(siblingsMap).length + 1; // siblings + entry
        let callIndex = 0;
        let entrySelector = null;

        // Per-source esbuild transform. The entry's selector is rewritten to
        // a fresh per-render tag so we can mount a unique element; sibling
        // components keep their Rozie-emitter selectors so the entry's
        // template tags (e.g. `<rozie-sortable-list />`) still match.
        // Detect the entry as the LAST call importBundleWith makes —
        // siblings come first (one per entry in `siblings`), entry comes
        // last.
        const transformOne = async (src) => {
          callIndex += 1;
          // Angular never wired a css-import helper at all before Phase 69-01 —
          // an unresolvable bare `.css` side-effect import passed straight
          // through esbuild's syntax-only transform and hard-crashed the
          // dynamic `import()` of the resulting blob module. Strip/capture it
          // first, same as every other harness.
          const { code: stubbed, cssSpecifiers } = stubUnresolvableImports(src);
          injectEngineCss(cssSpecifiers);
          const result = await transform(stubbed, {
            loader: 'ts',
            format: 'esm',
            target: 'es2022',
            tsconfigRaw: {
              compilerOptions: {
                experimentalDecorators: true,
                emitDecoratorMetadata: true,
                useDefineForClassFields: false,
              },
            },
          });
          if (callIndex === totalCalls) {
            const sel = `rozie-ng-${renderCount}`;
            entrySelector = sel;
            return result.code.replace(
              /selector\s*:\s*['"][^'"]+['"]/,
              `selector: '${sel}'`,
            );
          }
          return result.code;
        };

        const mod = await importBundleWith(transformOne, code, siblingsMap);
        const Component = mod.default || mod[Object.keys(mod)[0]];
        if (typeof Component !== 'function') {
          throw new Error('Angular compile produced no component class export');
        }
        if (!entrySelector) {
          // Defensive: importBundleWith should always end with the entry
          // transform call, but if its call order ever changes we'd silently
          // mount the wrong element. Bail loudly.
          throw new Error('Angular harness: entry selector never captured');
        }

        if (appRef) {
          try { appRef.destroy(); } catch (_) { /* already destroyed */ }
          appRef = null;
        }
        clearHost(host);
        const mount = document.createElement(entrySelector);
        host.appendChild(mount);

        appRef = await bootstrapApplication(Component, {
          providers: [
            provideZoneChangeDetection({ eventCoalescing: true }),
          ],
        });
      });
    </script>
  </body>
</html>
