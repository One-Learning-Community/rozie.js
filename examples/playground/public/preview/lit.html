<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Rozie preview — Lit</title>
    <script type="importmap">
      {
        "imports": {
          "lit": "https://esm.sh/lit@3.3.3",
          "lit/decorators.js": "https://esm.sh/lit@3.3.3/decorators.js",
          "lit/directives/repeat.js": "https://esm.sh/lit@3.3.3/directives/repeat.js",

          "lit/directives/style-map.js": "https://esm.sh/lit@3.3.3/directives/style-map.js",
          "lit/directives/ref.js": "https://esm.sh/lit@3.3.3/directives/ref.js",
          "@lit-labs/preact-signals": "https://esm.sh/@lit-labs/preact-signals@1.0.3",
          "@preact/signals-core": "https://esm.sh/@preact/signals-core@1.14.3",
          "@rozie/runtime-lit": "/preview/runtimes/lit.mjs",
          "sortablejs": "https://esm.sh/sortablejs@1.15.7",
          "flatpickr": "https://esm.sh/flatpickr@4.6.13",
          "leaflet": "https://esm.sh/leaflet@1.9.4",
          "chart.js": "https://esm.sh/chart.js@4.5.1",
          "@fullcalendar/core": "https://esm.sh/@fullcalendar/core@6.1.21",
          "@fullcalendar/daygrid": "https://esm.sh/@fullcalendar/daygrid@6.1.21",
          "@fullcalendar/timegrid": "https://esm.sh/@fullcalendar/timegrid@6.1.21",
          "@fullcalendar/interaction": "https://esm.sh/@fullcalendar/interaction@6.1.21",
          "@tiptap/core": "https://esm.sh/@tiptap/core@3.27.1",
          "@tiptap/starter-kit": "https://esm.sh/@tiptap/starter-kit@3.27.1",
          "@uppy/core": "https://esm.sh/@uppy/core@5.2.0",
          "@uppy/xhr-upload": "https://esm.sh/@uppy/xhr-upload@5.2.0",
          "embla-carousel": "https://esm.sh/embla-carousel@8.6.0",
          "embla-carousel-autoplay": "https://esm.sh/embla-carousel-autoplay@8.6.0",
          "cropperjs": "https://esm.sh/cropperjs@1.6.2",
          "@codemirror/state": "https://esm.sh/@codemirror/state@6.7.0",
          "@codemirror/view": "https://esm.sh/@codemirror/view@6.43.4",
          "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.10.4",
          "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@6.2.5",
          "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.3",
          "codemirror": "https://esm.sh/codemirror@6.0.2",
          "pdfjs-dist": "https://esm.sh/pdfjs-dist@6.1.200",
          "@tanstack/table-core": "https://esm.sh/@tanstack/table-core@8.21.3",
          "@tanstack/virtual-core": "https://esm.sh/@tanstack/virtual-core@3.17.3",
          "@floating-ui/dom": "https://esm.sh/@floating-ui/dom@1.7.6"
        }
      }
    </script>
    <style>
      html, body { margin: 0; height: 100%; font-family: system-ui; }
      #app { min-height: 100%; padding: 12px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { getEsbuildTransform, importBundleWith, bootHarness, clearHost, stubUnresolvableImports, injectEngineCss } from './_shared.js';

      const host = document.getElementById('app');
      // Counter so each render produces a unique custom-element tag (custom
      // elements can only be defined once per tag name; re-defining throws).
      let counter = 0;
      let placeholderCounter = 0;

      // Idempotent customElements.define. Multi-file bundle siblings (e.g.
      // SortableListDemo importing SortableList) compile to LitElement custom
      // elements with a STABLE tag (`rozie-sortable-list`) — the entry's
      // template references that exact tag, so the sibling cannot be given a
      // per-render placeholder name like the entry is. But this iframe is
      // reused across renders, so the sibling's `customElements.define` runs
      // again on every re-render and throws `NotSupportedError: ... already
      // been defined`. Skipping the redefine keeps the first render's class
      // registered — acceptable for a preview surface, and far better than a
      // hard crash. The entry itself still gets a fresh `rozie-preview-N` tag
      // per render (below), so editing the entry always re-renders live.
      const __origDefine = customElements.define.bind(customElements);
      customElements.define = (name, ctor, options) => {
        if (customElements.get(name)) return;
        __origDefine(name, ctor, options);
      };

      bootHarness(async ({ code, siblings }) => {
        const transform = await getEsbuildTransform();

        // Per-source: esbuild ts → esm + customElements-name rewrite. Each
        // call gets its own placeholder name so the same source compiled
        // twice doesn't accidentally collide (the importBundleWith pass calls
        // this once per sibling AND once for the entry).
        const transformOne = async (src) => {
          const { code: stubbed, cssSpecifiers } = stubUnresolvableImports(src);
          injectEngineCss(cssSpecifiers);
          const result = await transform(stubbed, {
            loader: 'ts',
            format: 'esm',
            target: 'es2022',
            tsconfigRaw: {
              compilerOptions: {
                experimentalDecorators: true,
                useDefineForClassFields: false,
              },
            },
          });
          const phName = `__placeholder_${++placeholderCounter}__`;
          return result.code
            .replace(/customElements\s*\.\s*define\s*\([^)]*\)\s*;?/g, '')
            .replace(/_customElement\(['"][^'"]*['"]\)/g, `_customElement("${phName}")`);
        };

        const mod = await importBundleWith(transformOne, code, siblings ?? {});
        const Component = mod.default;
        if (typeof Component !== 'function') {
          throw new Error('compiled output has no default LitElement class export');
        }

        // CustomElementRegistry tracks constructor identity — the same class
        // can't be registered twice even under different tag names. Wrap in a
        // fresh anonymous subclass per render so each define() gets a new
        // constructor.
        const tag = `rozie-preview-${++counter}`;
        const Wrapper = class extends Component {};
        customElements.define(tag, Wrapper);

        clearHost(host);
        host.appendChild(document.createElement(tag));
      });
    </script>
  </body>
</html>
