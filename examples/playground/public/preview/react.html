          "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.3",

    <!-- Cropper.js overlay CSS is EXTERNAL (not shippable via the scoped .rozie <style>);
         the playground drops CSS side-effect imports, so link it here (68-04). -->
    <link rel="stylesheet" href="https://esm.sh/cropperjs@1.6.2/dist/cropper.css" />
    <style>
      html, body { margin: 0; height: 100%; font-family: system-ui; }
      #app { min-height: 100%; padding: 12px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import * as React from 'react';
      import { createRoot } from 'react-dom/client';
      import { getEsbuildTransform, importBundleWith, bootHarness, stubUnresolvableImports, setSidecarCss } from './_shared.js';

      const host = document.getElementById('app');
      let root = null;

      bootHarness(async ({ code, css, siblings }) => {
        // React target emits CSS to a separate sidecar (r.css) rather than
        // inlining; install it before transforming so the rendered DOM is
        // already styled when the JSX mounts.
        setSidecarCss(css);

        const transform = await getEsbuildTransform();

        // Per-source transform used for both the entry and each sibling.
        // Factored out of the original linear path so importBundleWith can
        // call it once per sibling AND once for the entry after relative
        // imports are rewritten to blob URLs.
        const transformOne = async (src) => {
          const result = await transform(stubUnresolvableImports(src), {
            loader: 'tsx',
            format: 'esm',
            target: 'es2020',
            jsx: 'automatic',
          });
          return result.code;
        };

        const mod = await importBundleWith(transformOne, code, siblings ?? {});
        const Component = mod.default || mod.Component;
        if (typeof Component !== 'function' && typeof Component !== 'object') {
          throw new Error('compiled output has no default React component export');
        }

        if (root) root.unmount();
        root = createRoot(host);
        root.render(React.createElement(Component));
      });
    </script>
  </body>
</html>
