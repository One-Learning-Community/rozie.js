<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Rozie preview — Vue</title>
    <script type="importmap">
      {
        "imports": {
          "vue": "https://esm.sh/vue@3.5.13/dist/vue.esm-browser.js",
          "@vue/compiler-sfc": "https://esm.sh/@vue/compiler-sfc@3.5.13",
          "@rozie/runtime-vue": "/preview/runtimes/vue.mjs",
          "sortablejs": "https://esm.sh/sortablejs@1.15.6",
          "flatpickr": "https://esm.sh/flatpickr@4.6.13",
          "leaflet": "https://esm.sh/leaflet@1.9.4",
          "chart.js": "https://esm.sh/chart.js@4.5.1",
          "@fullcalendar/core": "https://esm.sh/@fullcalendar/core@6.1.20",
          "@fullcalendar/daygrid": "https://esm.sh/@fullcalendar/daygrid@6.1.20",
          "@fullcalendar/timegrid": "https://esm.sh/@fullcalendar/timegrid@6.1.20",
          "@fullcalendar/interaction": "https://esm.sh/@fullcalendar/interaction@6.1.20",
          "@tiptap/core": "https://esm.sh/@tiptap/core@3.23.5",
          "@tiptap/starter-kit": "https://esm.sh/@tiptap/starter-kit@3.23.5",
          "@uppy/core": "https://esm.sh/@uppy/core@5.2.0",
          "@uppy/xhr-upload": "https://esm.sh/@uppy/xhr-upload@5.2.0"
        }
      }
    </script>
    <style>
      html, body { margin: 0; height: 100%; font-family: system-ui; }
      #app { min-height: 100%; padding: 12px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { createApp } from 'vue';
      import { parse, compileScript, compileTemplate, compileStyle } from '@vue/compiler-sfc';
      import { getEsbuildTransform, importBundleWith, bootHarness, clearHost, isPassthroughTs } from './_shared.js';

      const host = document.getElementById('app');
      let app = null;
      let renderCount = 0;
      let sfcCounter = 0;

      bootHarness(async ({ code: sfcSource, siblings }) => {
        ++renderCount;
        const transform = await getEsbuildTransform();

        // Per-source SFC pipeline. Each sibling SFC gets its own scope id so
        // its scoped styles don't collide with the entry or other siblings.
        // Side effect: injects compiled <style> blocks into document.head,
        // same as the original linear path — but now per sibling too, so a
        // sibling SFC's <style> still surfaces in the rendered iframe.
        const transformOne = async (src) => {
          // Phase 68-03 — a plain relative `.ts` helper sibling (e.g.
          // `./internal/buildMonthGrid`). esbuild-lower it directly; running it
          // through `parse()` below would find no <script>/<template> and emit
          // `export default {}`, dropping the helper's named exports.
          if (isPassthroughTs(src)) {
            const lowered = await transform(src, { loader: 'ts', format: 'esm', target: 'es2020' });
            return lowered.code;
          }
          const id = `rozie-vue-${renderCount}-${++sfcCounter}`;
          const { descriptor } = parse(src, { filename: 'Playground.vue' });
          const hasScoped = descriptor.styles.some((s) => s.scoped);

          // Script (composition API w/ <script setup>). When the SFC has
          // <style scoped>, the same `id` MUST be threaded into the inlined
          // template compile so the template's elements receive the matching
          // `data-v-<id>` attribute — otherwise the scoped selectors compiled
          // below have nothing to bind to.
          let scriptCode = '';
          if (descriptor.script || descriptor.scriptSetup) {
            const compiled = compileScript(descriptor, {
              id,
              inlineTemplate: true,
              templateOptions: {
                id,
                scoped: hasScoped,
                compilerOptions: { expressionPlugins: ['typescript'], scopeId: hasScoped ? `data-v-${id}` : undefined },
              },
            });
            scriptCode = compiled.content;
          } else {
            scriptCode = 'export default {}';
          }

          // If the script has TS (most Rozie-emitted Vue does), lower it.
          const tsLowered = await transform(scriptCode, {
            loader: 'ts',
            format: 'esm',
            target: 'es2020',
          });

          // Inject template render fn if compileScript didn't inline it (e.g.
          // no <script setup>). For Rozie's output, compileScript w/ inlineTemplate
          // bakes the template in — so this branch is unlikely but defensive.
          let finalCode = tsLowered.code;
          if (descriptor.template && !descriptor.scriptSetup) {
            const tplCompiled = compileTemplate({
              source: descriptor.template.content,
              filename: 'Playground.vue',
              id,
            });
            finalCode = tplCompiled.code + '\n' + finalCode;
          }

          // <style scoped> handling — compile + inject. We deliberately pass
          // `scoped: false` even when the SFC declared `<style scoped>`: Vue's
          // standard build pipeline (vite-plugin-vue) attaches `__scopeId` to
          // the component options so the runtime auto-stamps the data-v
          // attribute on the root, but compileScript+inlineTemplate alone
          // doesn't inject `__scopeId` — leaving scoped selectors that bind
          // to a never-applied attribute. Since each iframe renders ONE
          // component at a time, dropping scope is safe and yields visible
          // styles instead of unmounted CSS rules.
          for (const styleBlock of descriptor.styles) {
            const compiled = compileStyle({
              source: styleBlock.content,
              filename: 'Playground.vue',
              id: `data-v-${id}`,
              scoped: false,
            });
            const tag = document.createElement('style');
            tag.dataset.rozieVueStyle = id;
            tag.textContent = compiled.code;
            document.head.appendChild(tag);
          }

          return finalCode;
        };

        const mod = await importBundleWith(transformOne, sfcSource, siblings ?? {});
        const Component = mod.default;
        if (!Component) throw new Error('Vue SFC produced no default export');

        if (app) app.unmount();
        clearHost(host);
        app = createApp(Component);
        app.mount(host);
      });
    </script>
  </body>
</html>
