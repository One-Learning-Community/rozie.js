name: Angular 19 + 21 Matrix

# Phase 5 Plan 05-04b — verify the emitted .ts output works against the
# Angular 19 floor (PROJECT.md constraint — signals era; floor bumped from
# 17 to 19 in May 2026 after Angular 17 hit EOL and the TS ~5.4.5 workspace
# pin became the root cause of @analogjs/vite-plugin-angular's
# `ts.createPrinter is not a function` crash) AND the latest Angular 21.
# Runs on PRs touching @rozie/target-angular / @rozie/unplugin /
# the angular-analogjs demo.
#
# Matrix: Angular 19.x floor + 21.x latest × Vite 6 (analogjs 2.5.x peerDeps
# require vite ^6 || ^7 || ^8 per RESEARCH OQ6 RESOLVED — Vite 5 is NOT
# supported on the Angular target).
#
# Mirrors svelte-matrix.yml shape (per-leg pnpm add overrides, install
# playwright, run e2e, upload report on failure).

on:
  pull_request:
    paths:
      - 'packages/targets/angular/**'
      - 'packages/unplugin/**'
      - 'packages/core/**'
      - 'examples/consumers/angular-analogjs/**'
      - 'tests/integration/angular-analogjs/**'
      - '.github/workflows/angular-matrix.yml'
  push:
    branches: [main]

jobs:
  angular-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        angular-version: ['19', '21']
        vite-version: ['6']
        # Vite 5 is excluded entirely from the Angular target — analogjs
        # 2.5.x peerDeps require vite ^6 || ^7 || ^8. ROZ702 enforces this
        # at factory call time. CI matrix mirrors the runtime constraint.
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo build output
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      # Build the whole workspace via turbo. The swipe canary's emit tests
      # (Plan 07.1-03) import every target's dist/ and the dts-identity test
      # reads every target's dist/index.d.mts — so all 6 targets must be built
      # even on Angular-only CI runs.
      - name: Build all packages
        run: pnpm turbo run build

      - name: Run unit tests (core + targets + runtime + unplugin)
        run: |
          pnpm exec vitest run --root packages/core
          pnpm exec vitest run --root packages/targets/angular
          pnpm exec vitest run --root packages/targets/svelte
          pnpm exec vitest run --root packages/targets/vue
          pnpm exec vitest run --root packages/targets/react
          pnpm exec vitest run --root packages/runtime/vue
          pnpm exec vitest run --root packages/runtime/react
          pnpm exec vitest run --root packages/unplugin

      - name: Override Angular + Vite versions for the demo
        working-directory: examples/consumers/angular-analogjs
        run: |
          pnpm add @angular/core@^${{ matrix.angular-version }} \
                   @angular/common@^${{ matrix.angular-version }} \
                   @angular/compiler@^${{ matrix.angular-version }} \
                   @angular/forms@^${{ matrix.angular-version }} \
                   @angular/platform-browser@^${{ matrix.angular-version }} \
                   @angular/platform-browser-dynamic@^${{ matrix.angular-version }}
          pnpm add -D @angular/compiler-cli@^${{ matrix.angular-version }} \
                       vite@^${{ matrix.vite-version }}
          # Demo defaults already match Angular 21 (TS ~5.9, @angular/build@21,
          # analogjs vite-plugin 2.5.x) — the v21 leg needs no extra override.
          # For the Angular 19 floor leg, @angular/compiler-cli@19 requires
          # typescript >=5.5 <5.9, so we downgrade TS to ~5.7 (highest in
          # range that doesn't drag in another loaded TS version into the
          # subgraph — see workspace pnpm.overrides note below). @angular/build
          # + @angular-devkit/build-angular get the v19 line too; analogjs
          # 2.5.x's peer-dep range (^18 || ^19 || ^20 || ^21) covers v19.
          if [ "${{ matrix.angular-version }}" = "19" ]; then
            pnpm add -D "typescript@~5.7" \
                         "@angular/build@^19" \
                         "@angular-devkit/build-angular@^19"
            # CI-only workspace TS pin for the v19 leg.
            #
            # @analogjs/vite-plugin-angular@2.5.x does NOT declare typescript
            # as a (peer)dependency, so its `import 'typescript'` walks up
            # from its .pnpm/ subgraph and resolves to whichever typescript
            # the workspace root hoists — which on this repo is ~5.9.3
            # (tsdown's transitive dep). Meanwhile @angular/compiler-cli@19's
            # own peer-pinned subgraph resolves typescript@5.7. Two TS
            # versions then load in the same Vite process. analogjs uses
            # 5.9 to parse SourceFiles; compiler-cli's 5.7 binder doesn't
            # recognise 5.9's AST node-kind table; getContainerFlags returns
            # 0 (None); bindContainer skipped; currentFlow undefined;
            # NgCompiler's first getTypeChecker() crashes at checkUnreachable
            # with "Cannot read properties of undefined (reading 'flags')".
            #
            # Same family of bug as the May 2026 dual-version (5.4 vs 5.9)
            # crash documented in .planning/debug/angular-appcomponent-aot.md.
            # Workaround: force a single TS version (~5.7, in compiler-cli@19's
            # range) workspace-wide for THIS CI leg only via pnpm.overrides.
            # No other matrix leg + no consumer's lockfile is affected.
            #
            # Real fix belongs upstream — analogjs should declare typescript
            # as a peerDependency so pnpm dedupes it correctly.
            node -e "const fs=require('fs');const p='../../../package.json';const j=JSON.parse(fs.readFileSync(p));j.pnpm=j.pnpm??{};j.pnpm.overrides=j.pnpm.overrides??{};j.pnpm.overrides.typescript='~5.7';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');console.log('pinned workspace TS to ~5.7 for the v19 leg');"
          fi

      - name: Re-install with version overrides
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck demo
        run: pnpm --filter angular-analogjs-demo run typecheck

      - name: Build demo
        run: pnpm --filter angular-analogjs-demo run build

      - name: Install Playwright Chromium
        run: pnpm --filter angular-analogjs-demo run test:e2e:install

      - name: Run Playwright e2e tests
        run: pnpm --filter angular-analogjs-demo run test:e2e

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-angular-${{ matrix.angular-version }}-vite-${{ matrix.vite-version }}
          path: examples/consumers/angular-analogjs/playwright-report
          retention-days: 7

  # Phase 5 success criterion #3 / ANGULAR-06 — analogjs CI integration.
  #
  # Builds tests/integration/angular-analogjs/ which is a minimal,
  # self-contained Angular app that imports Counter.rozie via @rozie/unplugin
  # (target:'angular') + @analogjs/vite-plugin-angular and bootstraps it via
  # bootstrapApplication(IntegrationApp). Verifies the production AOT path
  # works end-to-end against both Angular 19 floor and Angular 21 latest.
  # (Floor bumped from 17 to 19 in May 2026 after Angular 17 hit EOL.)
  #
  # Gated on the demo matrix completing — a regression in @rozie/unplugin
  # surfaces on the demo first, so we don't waste CI minutes running
  # integration when the demo's already broken.
  integration-build:
    name: Angular AnalogJS integration (Phase 5 success criterion #3)
    needs: [angular-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        angular-version: ['19', '21']
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Override Angular version for the integration project
        working-directory: tests/integration/angular-analogjs
        run: |
          pnpm add @angular/core@^${{ matrix.angular-version }} \
                   @angular/common@^${{ matrix.angular-version }} \
                   @angular/compiler@^${{ matrix.angular-version }} \
                   @angular/forms@^${{ matrix.angular-version }} \
                   @angular/platform-browser@^${{ matrix.angular-version }}
          pnpm add -D @angular/compiler-cli@^${{ matrix.angular-version }}
          # Integration project pins Angular 19 + TS ~5.6 + analogjs 2.5.1 +
          # @angular/build 19 (the floor). The v21 matrix leg needs to bump
          # TS to ~5.9 (compiler-cli@21 requires >=5.9 <6.1) and @angular/build
          # + @angular-devkit/build-angular to ^21. analogjs 2.5.1 already
          # satisfies v21's peer-dep range so it doesn't need re-pinning.
          if [ "${{ matrix.angular-version }}" = "21" ]; then
            pnpm add -D "typescript@~5.9" \
                         "@angular/build@^21" \
                         "@angular-devkit/build-angular@^21"
          fi
          # NB: no workspace TS override for the integration v19 leg —
          # the integration project's package.json already pins
          # `typescript: ~5.6.0` and `@angular/compiler-cli: ^19.0.0`,
          # which resolve correctly inside its own subgraph. The matrix-
          # demo job above DOES need a workspace override because the
          # demo's package.json defaults are TS ~5.9 + compiler-cli ^21
          # for the v21 leg's convenience, and analogjs's missing-peerDep
          # walk-up bites it. The integration project carries the v19
          # floor as its baseline, so analogjs walks up and finds the
          # correct subgraph naturally. Adding a `~5.7` override here
          # would force compiler-cli@21 (pulled into the workspace by the
          # demo's v21 default) to use TS 5.7 — which it rejects (needs
          # >=5.9), crashing analogjs at NgtscProgram construction.

      - name: Re-install with version overrides
        run: pnpm install --no-frozen-lockfile

      # Use turbo so the unplugin's workspace deps (@rozie/core, target
      # packages) are built first — `pnpm --filter @rozie/unplugin run
      # build` builds ONLY the unplugin and Vite then crashes loading
      # dist/src-*.mjs with `Cannot find module '@rozie/core/dist/index.mjs'`
      # because the leaf dep was never produced. Mirror the angular-matrix
      # job above which uses `pnpm turbo run build`.
      - name: Build @rozie/unplugin and its workspace deps
        run: pnpm turbo run build --filter @rozie/unplugin

      - name: Build integration project (Phase 5 success criterion #3)
        run: pnpm -F rozie-angular-analogjs-integration build

      - name: Verify Counter.rozie AOT-compiled output present in dist
        working-directory: tests/integration/angular-analogjs
        run: |
          test -d dist
          # Grep for AOT proof: ɵcmp static-field assignment with rozie-counter
          # selector. If only ivy runtime helper accessors are present (e.g.,
          # `t.ɵcmp` member accesses), the build fell back to JIT and this
          # step fails — a regression we want CI to catch.
          grep -o 'selectors:\[\["rozie-counter"' dist/assets/*.js | head -1
