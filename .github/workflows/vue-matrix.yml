name: Vue 3.4 + 3.5 Matrix

# Phase 3 Plan 06 / D-27: verify the emitted .vue output works against both
# the Vue 3.4 floor (the version that introduced `defineModel` — PROJECT.md
# constraint) AND the latest Vue 3.5.x. Sequential steps rather than a real
# matrix per RESEARCH OQ5 — over-engineering for v1.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vue-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo build output
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      # Build the whole workspace via turbo. The swipe canary's emit tests
      # (Plan 07.1-03) import every target's dist/, and the dts-identity test
      # reads every target's dist/index.d.mts — so all 6 targets must be built
      # even on Vue-only CI runs.
      - name: Build all packages
        run: pnpm turbo run build

      - name: Run unit tests (core + target-vue + runtime-vue + unplugin)
        run: |
          pnpm exec vitest run --root packages/core
          pnpm exec vitest run --root packages/targets/vue
          pnpm exec vitest run --root packages/runtime/vue
          pnpm exec vitest run --root packages/unplugin

      - name: Install Playwright Chromium
        run: pnpm --filter vue-vite-demo exec playwright install --with-deps chromium

      # ---- Vue 3.4 floor ----
      - name: Vue 3.4 — install + typecheck + build + e2e
        run: |
          pnpm --filter vue-vite-demo add vue@~3.4.0 --save-exact
          pnpm install --no-frozen-lockfile
          pnpm --filter vue-vite-demo run typecheck
          pnpm --filter vue-vite-demo run build
          pnpm --filter vue-vite-demo exec playwright test

      # ---- Vue 3.5 latest ----
      - name: Vue 3.5 — install + typecheck + build + e2e
        run: |
          pnpm --filter vue-vite-demo add vue@~3.5.0 --save-exact
          pnpm install --no-frozen-lockfile
          pnpm --filter vue-vite-demo run typecheck
          pnpm --filter vue-vite-demo run build
          pnpm --filter vue-vite-demo exec playwright test

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: examples/consumers/vue-vite/playwright-report
          retention-days: 7
