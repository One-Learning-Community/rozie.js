name: Vue 3.4 + 3.5 Matrix

# Phase 3 Plan 06 / D-27: verify the emitted .vue output works against both
# the Vue 3.4 floor (the version that introduced `defineModel` — PROJECT.md
# constraint) AND the latest Vue 3.5.x. Sequential steps rather than a real
# matrix per RESEARCH OQ5 — over-engineering for v1.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vue-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo build output
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      # Build the whole workspace via turbo. The swipe canary's emit tests
      # (Plan 07.1-03) import every target's dist/, and the dts-identity test
      # reads every target's dist/index.d.mts — so all 6 targets must be built
      # even on Vue-only CI runs.
      #
      # Phase 22 / REQ-6: `turbo run build` includes `vue-vite-demo#build`
      # (`vite build`), whose @rozie/unplugin `buildStart` hook emits the
      # per-module `<Name>.d.rozie.ts` sidecars. Sidecars are gitignored (REQ-7),
      # absent on a fresh checkout — this step generates them BEFORE the per-Vue
      # "install + typecheck + build + e2e" steps below (each of which runs
      # `vue-vite-demo run typecheck`), closing the cold-checkout race. Vue
      # honors the sidecar under the `moduleResolution: bundler` default (no
      # `allowArbitraryExtensions` flag needed — SPIKE-FINDINGS).
      - name: Build all packages (generates .d.rozie.ts sidecars before typecheck — REQ-6)
        run: pnpm turbo run build

      # quick task 260623-jwh + 260629-ksp: the @rozie-ui Vue-leaf gate. Runs
      # AFTER the `pnpm turbo run build` above so every Vue leaf's compiled dist
      # (+ dist .d.ts) AND each leaf's node_modules exist before the gates run.
      # Layer 1 (structural guard) asserts no Vue leaf is source-only; Layer 2
      # (strict consumer surface) typechecks a STRICT typed consumer of the
      # compiled data-table dist with vue-tsc; Layer 3 (family-children,
      # 260629-ksp) strict-vue-tsc's the family CHILD SFC *bodies* (the committed
      # src/*.vue) against a recorded baseline so a NEW SFC-body type regression
      # flips RED. `vitest run` auto-collects every *.test.ts here, so the
      # family-children gate needs no dedicated step. A future source-only,
      # consumer-type-broken, or SFC-body-regressed Vue leaf fails this step.
      - name: Vue-leaf gate — structural + strict consumer-surface + SFC-body typecheck
        run: pnpm --filter @rozie/vue-typecheck test

      # WR-03: after the build has generated every in-root sidecar, a `.rozie`
      # with NO sidecar means buildStart silently failed to emit it (the
      # consumer's tsc would fall back to the wildcard and type-lie). With
      # --require-complete that becomes a hard CI failure. Runs after the build
      # above and before the per-version typecheck steps below.
      - name: Verify every demo .rozie has a fresh sidecar (WR-03)
        run: node scripts/check-sidecar-staleness.mjs --require-complete

      - name: Run unit tests (core + target-vue + runtime-vue + unplugin)
        run: |
          pnpm exec vitest run --root packages/core
          pnpm exec vitest run --root packages/targets/vue
          pnpm exec vitest run --root packages/runtime/vue
          pnpm exec vitest run --root packages/unplugin

      - name: Install Playwright Chromium
        run: pnpm --filter vue-vite-demo exec playwright install --with-deps chromium

      # ---- Vue 3.4 floor ----
      - name: Vue 3.4 — install + typecheck + build + e2e
        run: |
          pnpm --filter vue-vite-demo add vue@~3.4.0 --save-exact
          pnpm install --no-frozen-lockfile
          pnpm --filter vue-vite-demo run typecheck
          pnpm --filter vue-vite-demo run build
          pnpm --filter vue-vite-demo exec playwright test

      # ---- Vue 3.5 latest ----
      - name: Vue 3.5 — install + typecheck + build + e2e
        run: |
          pnpm --filter vue-vite-demo add vue@~3.5.0 --save-exact
          pnpm install --no-frozen-lockfile
          pnpm --filter vue-vite-demo run typecheck
          pnpm --filter vue-vite-demo run build
          pnpm --filter vue-vite-demo exec playwright test

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: examples/consumers/vue-vite/playwright-report
          retention-days: 7
