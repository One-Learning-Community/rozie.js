name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      # The docs site live-compiles examples/*.rozie at build time two ways:
      #   1. @rozie/unplugin/vite renders the inline <Counter> demos (Vue), whose
      #      emitted SFCs import @rozie/runtime-vue at runtime.
      #   2. .vitepress/rozie-codegen.ts calls @rozie/core's compile() for ALL
      #      six targets to fill the rozie-out code blocks. @rozie/core's dist
      #      bundles every target emitter's source (packages/targets/**), so a
      #      change to any emitter changes the rendered output and must redeploy.
      - 'packages/core/**'
      - 'packages/targets/**'
      - 'packages/unplugin/**'
      - 'packages/runtime/vue/**'
      - 'examples/*.rozie'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @rozie/docs imports @rozie/unplugin/vite (compiles .rozie files at
      # build time) and the emitted Vue SFCs reference @rozie/runtime-vue
      # (debounce / throttle / useOutsideClick at runtime). Both packages
      # ship from their dist/, so build them before the docs build runs.
      # @rozie/core is bundled into the unplugin's dist via tsdown but we
      # still build it explicitly so the peggy generated parser is in place.
      - name: Build @rozie/core
        run: pnpm --filter @rozie/core run build

      - name: Build @rozie/unplugin
        run: pnpm --filter @rozie/unplugin run build

      - name: Build @rozie/runtime-vue
        run: pnpm --filter @rozie/runtime-vue run build

      - name: Build docs
        run: pnpm --filter @rozie/docs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5